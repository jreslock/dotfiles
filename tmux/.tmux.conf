# Terminal type: advertise tmux-256color inside, pass truecolor through for xterm-256color outside
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Increase scrollback history
set-option -g history-limit 50000

# Enable mouse for scrollback
set-option -g mouse on

# Ensure input is not broadcast across panes by default
set-window-option -g synchronize-panes off

# On new session, split into two side-by-side panes and focus the left one
# set-hook -g session-created 'split-window -h ; select-pane -L'
