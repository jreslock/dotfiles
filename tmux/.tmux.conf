# Terminal type: advertise tmux-256color inside, pass truecolor through for xterm-256color outside
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Increase scrollback history
set-option -g history-limit 50000

# Enable mouse for scrollback
set-option -g mouse on

# Ensure input is not broadcast across panes by default
set-window-option -g synchronize-panes off

# On new session, split into two side-by-side panes and focus the left one
# set-hook -g session-created 'split-window -h ; select-pane -L'

# --- SSM sleep/wake + reattach behavior (added 2026-06-05) ---
# Size each window to the client actively viewing it, not the smallest client
# attached anywhere — so a lingering ghost client (e.g. after a Mac sleep) can't
# shrink/garble the fleet TUIs. Pairs with `fleet-reattach` (tmux attach -d).
set-window-option -g aggressive-resize on

# Near-zero ESC delay so the Ink/React TUIs repaint snappily on reattach.
set-option -sg escape-time 10
